apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy-server
  namespace: haproxy-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: haproxy-server
  template:
    metadata:
      labels:
        app: haproxy-server
    spec:
      containers:
        - name: app
          image: haproxy-server:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http-app
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: haproxy-sidecar
          image: haproxy:2.9
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: https-sidecar
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
            - name: haproxy-tls
              mountPath: /usr/local/etc/haproxy/certs
              readOnly: true
      volumes:
        - name: haproxy-config
          configMap:
            name: haproxy-sidecar-config
        - name: haproxy-tls
          secret:
            secretName: haproxy-sidecar-tls
